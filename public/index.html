<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Agent Workflow App</title>
		<style>
			:root {
				--primary-color: #5b5bf0;
				--primary-hover: #4747d6;
				--light-bg: #f9fafb;
				--border-color: #e5e7eb;
				--text-color: #1f2937;
				--text-light: #6b7280;
				--user-msg-bg: #eef2ff;
				--assistant-msg-bg: #f3f4f6;
				--step-bg: #ffffff;
			}

			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			body {
				font-family:
					-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
					Cantarell, sans-serif;
				line-height: 1.6;
				color: var(--text-color);
				max-width: 800px;
				margin: 0 auto;
				padding: 1rem;
			}

			header {
				text-align: center;
				margin-bottom: 2rem;
				padding: 1rem 0;
				border-bottom: 1px solid var(--border-color);
			}

			h1 {
				font-size: 1.5rem;
				color: var(--primary-color);
			}

			.chat-container {
				display: flex;
				flex-direction: column;
				height: calc(100vh - 200px);
				min-height: 400px;
				border: 1px solid var(--border-color);
				border-radius: 8px;
				overflow: hidden;
			}

			.chat-messages {
				flex: 1;
				overflow-y: auto;
				padding: 1rem;
				background-color: var(--light-bg);
			}

			.message {
				margin-bottom: 1rem;
				padding: 0.75rem;
				border-radius: 8px;
				max-width: 80%;
			}

			.message p {
				white-space: pre-line;
				margin: 0;
				overflow-wrap: anywhere;
			}

			.agent-steps {
				display: grid;
				gap: 0.5rem;
				margin-bottom: 0.75rem;
			}

			.agent-step {
				border: 1px solid var(--border-color);
				border-radius: 6px;
				background: var(--step-bg);
				padding: 0.5rem;
				font-size: 0.85rem;
			}

			.agent-step strong {
				display: block;
				color: var(--primary-color);
				font-size: 0.75rem;
				letter-spacing: 0.03em;
				margin-bottom: 0.25rem;
				text-transform: uppercase;
			}

			.user-message {
				background-color: var(--user-msg-bg);
				align-self: flex-end;
				margin-left: auto;
			}

			.assistant-message {
				background-color: var(--assistant-msg-bg);
				align-self: flex-start;
			}

			.message-input {
				display: grid;
				gap: 0.5rem;
				padding: 0.75rem;
				border-top: 1px solid var(--border-color);
				background-color: white;
			}

			.input-row {
				display: flex;
			}

			.skill-picker {
				display: flex;
				align-items: center;
				gap: 0.5rem;
				font-size: 0.85rem;
				color: var(--text-light);
			}

			#skill-select {
				border: 1px solid var(--border-color);
				border-radius: 4px;
				font-family: inherit;
				padding: 0.35rem 0.5rem;
			}

			#user-input {
				flex: 1;
				padding: 0.75rem;
				border: 1px solid var(--border-color);
				border-radius: 4px;
				font-family: inherit;
				resize: none;
				min-height: 44px;
			}

			#send-button {
				margin-left: 0.5rem;
				padding: 0 1rem;
				background-color: var(--primary-color);
				color: white;
				border: none;
				border-radius: 4px;
				cursor: pointer;
				transition: background-color 0.2s;
			}

			#send-button:hover {
				background-color: var(--primary-hover);
			}

			#send-button:disabled {
				background-color: var(--text-light);
				cursor: not-allowed;
			}

			.typing-indicator {
				display: none;
				font-style: italic;
				color: var(--text-light);
				padding: 1rem;
			}

			.typing-indicator.visible {
				display: block;
			}

			footer {
				margin-top: 1rem;
				text-align: center;
				font-size: 0.85rem;
				color: var(--text-light);
			}
		</style>
	</head>
	<body>
		<header>
			<h1>Agent Workflow</h1>
			<p>Plan, call tools, and respond with Cloudflare Workers AI</p>
		</header>

		<div class="chat-container">
			<div id="chat-messages" class="chat-messages">
				<div class="message assistant-message">
					<p>
						Describe a task and I will plan the workflow, call demo tools, and
						stream back a final answer.
					</p>
				</div>
			</div>

			<div class="typing-indicator" id="typing-indicator">
				Agent is working...
			</div>

			<div class="message-input">
				<label class="skill-picker" for="skill-select">
					Skill
					<select id="skill-select">
						<option value="">No skill</option>
					</select>
				</label>
				<div class="input-row">
					<textarea
						id="user-input"
						placeholder="Try: Triage an AI Gateway rollout for account 123"
						rows="1"
						autofocus
					></textarea>
					<button id="send-button">Send</button>
				</div>
			</div>
		</div>

		<footer>
			<p>Agent Workflow Template</p>
		</footer>

		<!-- Chat app script -->
		<script src="chat.js"></script>
	</body>
</html>
